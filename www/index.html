<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>יצירת שובר רכבת</title>
  <link rel="icon" type="image/png" href="../Rail-Voucher-Icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="card">
      <div class="header-row">
        <h1>יצירת שובר רכבת</h1>
        <button type="button" id="aboutBtn" class="icon-btn" title="אודות">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path fill="currentColor" d="M11,9H13V7H11M12,20C7.59,20 4,16.41 4,12C4,7.59 7.59,4 12,4C16.41,4 20,7.59 20,12C20,16.41 16.41,20 12,20M12,2C6.47,2 2,6.47 2,12C2,17.53 6.47,22 12,22C17.53,22 22,17.53 22,12C22,6.47 17.53,2 12,2M11,17H13V11H11V17Z" />
          </svg>
        </button>
      </div>

      <!-- Step 1: Trip form -->
      <div id="stepForm">
        <div class="direction-group" id="directionGroup">
          <button type="button" class="direction-btn active" data-direction="from-jerusalem">מירושלים</button>
          <button type="button" class="direction-btn" data-direction="to-jerusalem">אל ירושלים</button>
        </div>

        <form id="voucherForm" class="voucher-form">
          <label>
            <span id="stationLabel">תחנת יעד</span>
            <select id="otherStation" required>
              <option value="">טוען תחנות...</option>
            </select>
          </label>

          <div class="grid two-cols">
            <label>
              <span>תאריך</span>
              <input type="date" id="tripDate" required />
            </label>

            <label>
              <span>שעה</span>
              <select id="tripTime" required>
                <option value="">בחר שעה</option>
              </select>
            </label>
          </div>

          <label>
            <span>מספר טלפון</span>
            <input type="tel" id="phoneNumber" placeholder="05XXXXXXXX" required />
          </label>

          <input type="hidden" id="trainNumber" value="" />
          <input type="hidden" id="scheduleType" value="1" />
          <input type="hidden" id="trainType" value="empty" />

          <p id="statusText" class="microcopy"></p>

          <button type="submit" class="primary-btn">הזמן</button>
        </form>
      </div>

      <!-- Step 2: OTP verification -->
      <div id="stepOtp" class="hidden">
        <p class="microcopy" id="otpPrompt"></p>
        <div class="voucher-form">
          <label>
            <span>קוד אימות</span>
            <input type="text" id="otpInput" inputmode="numeric" placeholder="XXXXX" maxlength="10" />
          </label>
          <p id="otpStatusText" class="microcopy"></p>
          <div class="grid two-cols">
            <button type="button" id="otpBackBtn" class="secondary-btn">חזור</button>
            <button type="button" id="otpConfirmBtn" class="primary-btn">אמת והזמן</button>
          </div>
        </div>
      </div>

      <!-- Step 3: Result -->
      <div id="stepResult" class="hidden">
        <p class="microcopy success-text">ההזמנה בוצעה בהצלחה!</p>
        <p class="microcopy">מספר שובר: <strong id="resultId"></strong></p>
        <div class="barcode-wrap">
          <div id="qrcode"></div>
        </div>
        <button type="button" id="resetBtn" class="primary-btn" style="margin-top:16px;">הזמנה חדשה</button>
      </div>
    </section>
  </main>

  <div id="aboutModal" class="modal-overlay hidden">
    <div class="modal-card">
      <h2>אודות</h2>
      <p class="microcopy">אפליקציה ליצירת שובר עליה לרכבת ישראל.</p>
      <p class="microcopy">נכתב ע"י: <strong>Yoav Romach</strong></p>
      <div class="version-info">
        <p>גרסה נוכחית: <span id="currentVersion">0.2.0</span></p>
        <p id="latestVersionRow">גרסה אחרונה: <a id="latestVersionLink" href="#" target="_blank"><span id="latestVersion">טוען...</span></a></p>
      </div>
      <p class="microcopy">פרויקט בקוד פתוח:</p>
      <a href="https://github.com/yomach/train_ticket" target="_blank" class="repo-link">GitHub Repository</a>
      <button type="button" id="closeAboutBtn" class="primary-btn" style="margin-top: 20px; width: 100%;">סגור</button>
    </div>
  </div>

  <script src="vendor/qrcode.min.js"></script>
  <script src="booking-helpers.js"></script>
  <script src="app.js"></script>
</body>
</html>
